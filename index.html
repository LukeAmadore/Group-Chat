<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Still in the Group Chat</title>
<style>
:root{
  /* Warm charcoal/brass instrument-panel surfaces (was cool blue-black) */
  --bg:#1E1B16;--panel:#26221B;--card:#2E291F;--hover:#3A331F;
  --border:#3D362A;--borderl:#4E4630;
  /* Names kept as-is (~200 call sites reference them) — values now hold the
     Foreman's Gauge palette: amber=brass (primary/budget), blue=patina
     (secondary mechanical), green=sage (positive/narrative), red=rust
     (negative/danger), purple=gold (political capital), teal=clay (comms
     track). Change a value here and every var()/color-mix() user follows.
     See CLAUDE.md visual-identity notes. */
  --amber:#C08A3E;--amberd:#9C6F2E;--blue:#5D9385;--green:#7FA06E;--red:#D17A57;
  --purple:#C7A24A;--teal:#BF8156;
  --t1:#EDE7DA;--t2:#C7BFAE;--tm:#948A76;
  /* System font stacks (no webfont/CDN dependency). --display is used sparingly
     for the two identity moments (game title, nav title); --mono covers dense
     small labels and real data digits alike. */
  --display:Futura,"Century Gothic","URW Gothic","Segoe UI",sans-serif;
  --sans:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --mono:ui-monospace,"SF Mono","Consolas","Menlo",monospace;
  --r:8px;--rs:4px;--rl:12px;
  /* Shape language: sharp mechanical shell, rounded narrative/situation cards,
     semi-rounded ruled report cards (postsurvey/reveal/closing) */
  --r-narr:16px;--r-narr-s:12px;--r-rep:6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--t1);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
#app{min-height:100vh}
.mono{font-family:var(--mono)}.amber{color:var(--amber)}.blue{color:var(--blue)}.green{color:var(--green)}

/* SCREENS */
.screen{max-width:700px;margin:0 auto;padding:48px 24px;min-height:100vh;display:flex;flex-direction:column;gap:28px}

/* DIFFICULTY */
.g-title-main{font-family:var(--display);font-size:30px;font-weight:700;letter-spacing:-.01em;text-align:center}
.g-title-sub{font-size:12px;color:var(--tm);letter-spacing:.15em;text-transform:uppercase;margin-top:5px;text-align:center}
.diff-ctx{font-size:13px;color:var(--t2);text-align:center;line-height:1.7}
.diff-cards{display:flex;flex-direction:column;gap:14px}
.diff-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--rl);padding:22px;cursor:pointer;transition:border-color .15s,background .15s;display:flex;flex-direction:column;gap:14px}
.diff-hdr{display:flex;align-items:center;gap:10px}
.diff-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.diff-lbl{font-weight:600;font-size:14px}
.diff-stats{display:flex;gap:20px;flex-wrap:wrap}
.dstat-v{font-family:var(--mono);font-size:18px;font-weight:600}
.dstat-l{font-size:10px;color:var(--tm);text-transform:uppercase;letter-spacing:.08em;margin-top:1px}
.diff-voice{font-size:12px;color:var(--t2);font-style:italic;line-height:1.6;padding-left:10px;border-left:2px solid var(--border)}

/* ONBOARDING */
.ob-badge{font-family:var(--mono);font-size:10px;letter-spacing:.15em;color:var(--amber);text-transform:uppercase}
.ob-title{font-size:24px;font-weight:700;line-height:1.3}
.ob-body{font-size:13px;color:var(--t2);line-height:1.7}
.ob-metrics{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ob-metric{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.ob-mv{font-family:var(--mono);font-size:24px;font-weight:600}
.ob-mn{font-size:12px;color:var(--t2);font-weight:600;margin-bottom:6px}
.ob-md{font-size:12px;color:var(--tm);line-height:1.5;margin-top:6px}
.ob-trust{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.ob-trust-hero{border-color:var(--amberd);padding:18px}
.ob-trust-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ob-trust-nm{font-size:12px;font-weight:600;color:var(--t2)}
.ob-trust-zn{font-family:var(--mono);font-size:11px;font-weight:600}
.ob-bar{height:6px;background:var(--bg);border-radius:3px;margin-bottom:6px;overflow:hidden}
.ob-zones{display:flex;justify-content:space-between}
.ob-zl{font-size:9px;color:var(--tm);font-family:var(--mono)}
.ob-trust-desc{font-size:12px;color:var(--tm);line-height:1.55;margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
.ob-actions{display:flex;gap:12px;align-items:center}

/* GAME SHELL */
.game-shell{display:flex;flex-direction:column;min-height:100vh}
.g-topbar{background:var(--panel);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;justify-content:space-between;align-items:center}
.g-topbar-title{font-family:var(--display);font-size:12px;font-weight:700;letter-spacing:.01em;color:var(--t2)}
.g-topbar-period{font-family:var(--mono);font-size:11px;color:var(--tm)}

/* TRUST BAR */
.trust-wrap{background:var(--panel);border-bottom:1px solid var(--border);padding:8px 16px 10px}
.trust-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.trust-left{display:flex;align-items:center;gap:8px}
.trust-title{font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--tm);text-transform:uppercase}
.trust-zone{font-family:var(--mono);font-size:11px;font-weight:600}
.trust-capital{display:flex;align-items:center;gap:6px}
.cap-lbl{font-size:10px;color:var(--tm);font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em}
.cap-val{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--purple)}
.cap-rate{font-size:10px;font-family:var(--mono)}
.trust-track{height:9px;background:#131009;border-radius:5px;position:relative;overflow:hidden;box-shadow:inset 0 2px 4px rgba(0,0,0,.55);border:1px solid #0D0B07}
.trust-fill,.resolve-bar-fill,.ob-bar-fill{height:100%;border-radius:2px 12px 12px 2px;position:relative;transition:width .7s cubic-bezier(.4,0,.2,1)}
.trust-fill::before,.resolve-bar-fill::before,.ob-bar-fill::before{content:'';position:absolute;left:0;right:0;top:1px;height:48%;background:linear-gradient(180deg,rgba(255,255,255,.4),rgba(255,255,255,0));mix-blend-mode:soft-light;pointer-events:none;border-radius:2px 12px 0 0}
.trust-fill::after,.resolve-bar-fill::after,.ob-bar-fill::after{content:'';position:absolute;top:0;right:-3px;width:16px;height:100%;background:radial-gradient(ellipse 65% 85% at 30% 26%,rgba(255,255,255,.75),rgba(255,255,255,.12) 55%,transparent 78%),radial-gradient(ellipse 70% 60% at 62% 84%,rgba(0,0,0,.4),transparent 72%);mix-blend-mode:soft-light;pointer-events:none}
.trust-zmarks{display:flex;justify-content:space-between;margin-top:3px}
.trust-zm{font-size:9px;color:var(--tm);font-family:var(--mono)}

/* BODY GRID */
.mob-strip{display:none}
.res-strip{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--panel)}
.res-strip-item{flex:1;padding:6px 14px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:2px}
.res-strip-item:last-child{border-right:none}
.res-strip-lbl{font-family:var(--mono);font-size:8px;letter-spacing:.12em;color:var(--tm);text-transform:uppercase}
.res-strip-val{font-family:var(--mono);font-size:13px;font-weight:600}
.cap-dot.pending{color:var(--amber)}
.mob-toggle{display:none;margin:14px 16px 4px;background:color-mix(in srgb, var(--amber) 8%, var(--card));border:1px solid var(--amberd);border-radius:var(--rs);padding:8px 12px;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--amber);cursor:pointer;width:calc(100% - 32px);align-items:center;justify-content:space-between}
.mob-toggle-chevron{transition:transform .2s}
.mob-toggle.open .mob-toggle-chevron{transform:rotate(180deg)}
.game-body{display:grid;grid-template-columns:220px 1fr;flex:1}
.panel-l{border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;max-height:100vh;overflow-y:auto}
.ls{padding:12px 14px;border-bottom:1px solid var(--border)}
.ls:last-child{border-bottom:none}
.ls-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.15em;color:var(--tm);text-transform:uppercase;margin-bottom:9px}

/* SCORES */
.score-row{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.score-row:last-child{margin-bottom:0}
.score-name{font-size:11px;color:var(--t2);flex:1;cursor:help;border-bottom:1px dashed var(--border)}
.score-val{font-family:var(--mono);font-size:15px;font-weight:600}
.score-warn{color:var(--amber);font-size:11px}
.tip{position:relative;display:inline-block}
.tip-box{position:absolute;bottom:calc(100% + 6px);left:0;background:#322C1F;border:1px solid var(--borderl);border-radius:var(--rs);padding:8px 10px;font-size:11px;color:var(--t2);line-height:1.5;min-width:200px;max-width:240px;opacity:0;pointer-events:none;transition:opacity .15s,transform .15s;z-index:50;transform:translateY(4px);font-family:var(--sans);font-weight:400}

/* TREE SUMMARY */
.tree-summary{display:flex;flex-direction:column;gap:10px}
.ts-track{display:flex;flex-direction:column;gap:4px}
.ts-track-name{font-size:10px;color:var(--tm);font-family:var(--mono)}
.ts-nodes{display:flex;gap:3px}
.ts-node{width:22px;height:22px;border-radius:3px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .3s;position:relative}
.ts-node.built{background:var(--amberd);border-color:var(--amber)}
.ts-node.avail{border-color:var(--borderl);background:var(--card)}
.ts-node.locked{opacity:.2}
@keyframes node-unlock{0%{transform:scale(.7);opacity:.3}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
@keyframes node-ring{0%{box-shadow:0 0 0 0 color-mix(in srgb, var(--amber) 70%, transparent)}100%{box-shadow:0 0 0 14px color-mix(in srgb, var(--amber) 0%, transparent)}}
.ts-node.unlocking{animation:node-unlock .55s ease-out forwards,node-ring .7s ease-out forwards;background:var(--amberd);border-color:var(--amber)}
.tree-view-btn{font-size:11px;color:var(--blue);background:none;border:none;cursor:pointer;text-align:left;padding:2px 0;font-family:var(--sans);margin-top:4px;text-decoration:underline}

/* RESOURCES */
.res-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.res-row:last-child{margin-bottom:0}
.res-lbl{font-size:11px;color:var(--t2)}
.res-val{font-family:var(--mono);font-size:13px;font-weight:600}
.cap-dot{font-size:12px;margin-left:1px}
.cap-dot.full{color:var(--blue)}.cap-dot.empty{color:var(--border)}

/* RIGHT PANEL */
.panel-r{padding:18px;display:flex;flex-direction:column;gap:14px;min-width:0}

/* SITUATION CARD */
.sit-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r-narr);padding:18px;display:flex;flex-direction:column;gap:13px}
.sit-hdr{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap}
.char-badge{display:flex;align-items:center;gap:9px}
.char-av{font-size:20px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:var(--card);border-radius:50%;border:1px solid var(--border);flex-shrink:0;color:var(--green)}
.char-name{font-weight:600;font-size:12px}
.char-role{font-size:10px;color:var(--tm)}
.tut-badge{font-size:10px;color:var(--amber);background:color-mix(in srgb, var(--amber) 10%, transparent);border:1px solid color-mix(in srgb, var(--amber) 30%, transparent);border-radius:20px;padding:2px 9px;white-space:nowrap}
.sit-title{font-weight:700;font-size:14px;line-height:1.3}
.sit-scenario{font-size:13px;color:var(--t2);line-height:1.65}
.sit-opts{display:flex;flex-direction:column;gap:9px}
.sit-opt{background:var(--card);border:1px solid var(--border);border-radius:var(--r-narr-s);padding:12px;cursor:pointer;transition:border-color .15s,background .15s;display:flex;flex-direction:column;gap:7px}
.sit-opt.lk{opacity:.5;cursor:not-allowed}
.opt-top{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.opt-badge{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.1em;color:var(--amber);background:color-mix(in srgb, var(--amber) 10%, transparent);border:1px solid color-mix(in srgb, var(--amber) 25%, transparent);border-radius:3px;padding:2px 7px;white-space:nowrap}
.opt-badge.lk{color:var(--tm);background:rgba(255,255,255,.03);border-color:var(--border)}
.opt-costs{display:flex;gap:4px;flex-wrap:wrap}
.cc{font-family:var(--mono);font-size:9px;padding:2px 5px;border-radius:3px;white-space:nowrap}
.cc.slot{color:var(--blue);background:color-mix(in srgb, var(--blue) 10%, transparent);border:1px solid color-mix(in srgb, var(--blue) 25%, transparent)}
.cc.bud{color:var(--amber);background:color-mix(in srgb, var(--amber) 10%, transparent);border:1px solid color-mix(in srgb, var(--amber) 25%, transparent)}
.cc.pc{color:var(--purple);background:color-mix(in srgb, var(--purple) 10%, transparent);border:1px solid color-mix(in srgb, var(--purple) 25%, transparent)}
.cc.unlock{color:var(--green);background:color-mix(in srgb, var(--green) 10%, transparent);border:1px solid color-mix(in srgb, var(--green) 25%, transparent)}
.opt-text{font-size:12px;color:var(--t2);line-height:1.55}
.opt-lock{font-size:10px;color:var(--tm);font-family:var(--mono)}
.opt-preview{font-size:11px;color:var(--green);font-style:italic;padding-top:5px;border-top:1px solid var(--border);line-height:1.5}

/* BUILD MODE */
.build-mode{background:var(--panel);border:1px solid var(--border);border-radius:var(--rl);padding:16px;display:flex;flex-direction:column;gap:14px}
.build-hdr{display:flex;justify-content:space-between;align-items:center}
.build-title{font-family:var(--mono);font-size:10px;letter-spacing:.15em;color:var(--tm);text-transform:uppercase}
.build-skip{background:transparent;color:var(--t2);border:1px solid var(--border);border-radius:var(--rs);padding:4px 10px;font-size:11px;cursor:pointer;font-family:var(--sans);transition:border-color .15s}
.build-done{font-size:13px;color:var(--green)}

/* BASKET */
.basket{background:var(--card);border:1px solid var(--borderl);border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:5}
.basket-chips{display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex:1}
.basket-empty{font-size:11px;color:var(--tm);font-style:italic}
.basket-chip{font-size:11px;background:color-mix(in srgb, var(--amber) 12%, transparent);color:var(--amber);border:1px solid color-mix(in srgb, var(--amber) 30%, transparent);border-radius:3px;padding:2px 7px;cursor:pointer}
.basket-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.basket-cost{font-family:var(--mono);font-size:11px;color:var(--t2)}
.btn-commit{background:var(--amber);color:#1E1B16;border:none;border-radius:var(--rs);padding:6px 14px;font-family:var(--mono);font-size:11px;font-weight:700;cursor:pointer;transition:background .15s}
.btn-commit[disabled]{opacity:.4;cursor:not-allowed;background:var(--amber)}

/* TRACKS GRID */
.tracks-grid{display:flex;flex-direction:column;gap:12px}
.track-block{border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.track-hdr{padding:10px 14px;border-bottom:1px solid var(--border)}
.track-name{font-weight:700;font-size:13px}
.track-focus{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.1em;margin:3px 0}
.track-when{font-size:11px;color:var(--t2);line-height:1.5}
.track-nodes{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border)}
.tn{background:var(--panel);padding:10px 8px;display:flex;flex-direction:column;gap:5px;transition:background .15s;position:relative}
.tn.built{background:color-mix(in srgb, var(--amberd) 10%, transparent)}
.tn.avail{cursor:pointer}
.tn.sel{cursor:pointer}
.tn.dimmed{opacity:.35}
.tn.locked{opacity:.35;cursor:not-allowed}
.tn-check{font-size:14px;font-weight:700;position:absolute;top:6px;right:6px}
.tn-icon{font-size:16px;color:var(--amber)}
.tn-name{font-size:11px;font-weight:600;line-height:1.3}
.tn-unlocks{font-size:10px;color:var(--green);line-height:1.4;margin-top:4px;padding-top:4px;border-top:1px solid rgba(255,255,255,.06)}
.tn-costs{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px}
.tn-locked-msg{font-size:9px;color:var(--tm);font-family:var(--mono);margin-top:2px}
.tn-cross{font-size:9px;color:var(--teal);font-family:var(--mono);margin-top:1px}
.tn-blocked{font-size:10px;color:var(--red);font-family:var(--mono);margin-top:2px}

/* RESOLVE */
.resolve-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r-rep);padding:16px;display:flex;flex-direction:column;gap:12px;opacity:0;transform:translateY(6px);transition:opacity .4s,transform .4s}
.resolve-card.show{opacity:1;transform:none}
.resolve-trust-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.resolve-trust-lbl{font-family:var(--mono);font-size:10px;color:var(--tm);text-transform:uppercase;letter-spacing:.1em}
.resolve-trust-delta{font-family:var(--mono);font-size:12px;font-weight:600}
.resolve-bar{height:9px;background:#131009;border-radius:5px;position:relative;overflow:hidden;margin-bottom:4px;box-shadow:inset 0 2px 4px rgba(0,0,0,.55);border:1px solid #0D0B07}
.resolve-bar-trail{position:absolute;top:0;height:100%;border-radius:4px}
.resolve-bar-fill{position:absolute;top:0;left:0}
.resolve-zone-lbl{font-family:var(--mono);font-size:10px;font-weight:600;margin-top:4px}
.cause-list{display:flex;flex-direction:column;gap:8px}
.cause-item{display:flex;gap:10px;align-items:flex-start}
.cause-tag{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.08em;padding:2px 6px;border-radius:3px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.cause-tag.dec{background:color-mix(in srgb, var(--amber) 12%, transparent);color:var(--amber);border:1px solid color-mix(in srgb, var(--amber) 25%, transparent)}
.cause-tag.org{background:color-mix(in srgb, var(--blue) 10%, transparent);color:var(--blue);border:1px solid color-mix(in srgb, var(--blue) 25%, transparent)}
.cause-tag.tree{background:color-mix(in srgb, var(--green) 10%, transparent);color:var(--green);border:1px solid color-mix(in srgb, var(--green) 25%, transparent)}
.cause-body{flex:1}
.cause-note{font-size:12px;color:var(--t2);line-height:1.5}
.cause-result{font-size:11px;color:var(--green);margin-top:3px;font-family:var(--mono)}
.cause-result.neg{color:var(--red)}

/* PULSE */
.pulse-card{border-left:3px solid var(--border);padding:10px 12px;display:flex;gap:8px;align-items:flex-start;background:var(--panel);border-radius:0 var(--r) var(--r) 0;border-top:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.pulse-card.pos{border-left-color:var(--green)}.pulse-card.neg{border-left-color:var(--red)}.pulse-card.neu{border-left-color:var(--amber)}
.pulse-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--tm);text-transform:uppercase;flex-shrink:0;margin-top:2px}
.pulse-ind{font-size:14px;font-weight:700;flex-shrink:0}
.pulse-card.pos .pulse-ind{color:var(--green)}.pulse-card.neg .pulse-ind{color:var(--red)}.pulse-card.neu .pulse-ind{color:var(--amber)}
.pulse-txt{font-size:12px;color:var(--t2);line-height:1.5;flex:1}

/* ADVANCE */
.adv-wrap{padding-top:2px}
.btn-adv{background:var(--card);color:var(--amber);border:1px solid var(--amber);border-radius:var(--r);padding:10px 18px;font-family:var(--mono);font-size:11px;font-weight:600;cursor:pointer;transition:background .15s;letter-spacing:.05em;width:100%}

/* REVEAL */
.reveal-badge{font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--amber);text-transform:uppercase}
.reveal-scores{display:flex;gap:36px;justify-content:center;padding:28px 0;flex-wrap:wrap}
.rv-item{display:flex;flex-direction:column;gap:6px;align-items:center}
.rv-val{font-family:var(--mono);font-size:48px;font-weight:600;line-height:1}
.rv-lbl{font-size:10px;color:var(--tm);text-transform:uppercase;letter-spacing:.1em}
.reveal-narr{font-size:13px;color:var(--t2);line-height:1.7;max-width:480px}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--panel);border:1px solid var(--green);border-radius:var(--r);padding:9px 14px;display:flex;align-items:center;gap:9px;font-size:12px;color:var(--t1);opacity:0;transition:opacity .25s,transform .25s;z-index:1000;max-width:360px;box-shadow:0 4px 20px rgba(0,0,0,.5);pointer-events:none}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto}

/* MOBILE */

/* Hover feedback only for pointer devices that actually support it — touch
   devices synthesize a lingering :hover on tap (the last-touched screen
   coordinate stays "hovered" until the next tap elsewhere), which made
   whatever re-rendered into that spot after a tap look selected. */
@media (hover:hover) and (pointer:fine){
.diff-card:hover{border-color:var(--borderl);background:var(--card)}

// Fixed annual bandwidth — same each year, grade bonus/cut applied as flat addition
var BASE_BUDGETS = {easy:500, normal:400, hard:250};

// Grade flat bonus/cut applied to next year's bandwidth
var GRADE_BUDGET_DELTA = {S:80,A:50,B:20,C:0,D:-30,F:-60};

// Annual ceiling on POSITIVE trust gained per year, shared across every source (decision
// options, node effects, ambient events, grade-shift). Losses are
// never capped. Applied before any number is displayed, so the resolve screen always shows
// the real, already-capped amount — nothing is hidden after the fact. Easy is uncapped by
// design (it is meant to hand a good player Champion). See CLAUDE.md balance notes.
var TRUST_ANNUAL_CAP = {easy:null, normal:10, hard:13};

function calcNextBudget(diff, year, grade, trustZone, currentBudget) {
  var base = BASE_BUDGETS[diff]||BASE_BUDGETS.normal;
  // Carry over 10% of unspent bandwidth (rest went to overhead)
  var carryover = currentBudget ? Math.round(currentBudget * 0.10) : 0;
  // Grade bonus/cut
  var gradeDelta = GRADE_BUDGET_DELTA[grade]||0;
  // Distant zone: additional -$20 penalty (people pulling back, not chipping in)
  var zonePenalty = trustZone==='skeptical' ? -20 : 0;
  return Math.max(50, base + carryover + gradeDelta + zonePenalty);
}

function calcGrade(ap, part, eng) {
  if(ap>=72&&part>=82&&eng>=72) return 'S';
  if(ap>=65&&part>=76&&eng>=66) return 'A';
  if(ap>=58&&part>=70&&eng>=60) return 'B';
  if(ap>=50&&part>=62&&eng>=54) return 'C';
  if(ap>=42) return 'D';
  return 'F';
}

function focusSignal(ap, part, grade) {
  if(grade==='S'||grade==='A'){
    if(ap>=70) return 'People believe you\'ll actually follow through. The group has real trust in you. Protect what built it.';
    return 'Strong year. Reliability is moving. Keep whatever got you here running.';
  }
  if(ap<50&&part<65) return 'People aren\'t showing up and don\'t believe it matters if they do. Turnout comes first. You can\'t move Reliability on plans nobody came to.';
  if(ap<50) return 'Turnout is holding but people still don\'t believe anything will actually change. They keep showing up. The follow-through doesn\'t yet feel real to them.';
  if(part<65) return 'People aren\'t showing up. Something is eroding their sense that it\'s worth the trip. That\'s the signal to chase before anything else.';
  if(grade==='C') return 'Holding steady isn\'t enough at this stage. Something in the chain isn\'t connecting a plan to people actually being there.';
  return 'Difficult year. The gap between what you say and what actually happens is what people are measuring. That\'s the problem to solve.';
}

}

// ── STATE ──
var S = {
  phase:'diff',diff:null,year:0,q:1,isTut:true,
  grade:null,nextBudget:0,preSurveyNote:'',
  trust:0,budget:0,cap:0,capUsed:0,polcap:0,
  eng:0,ap:0,part:0,
  tree:null,
  sit:null,sitDone:false,
  yearDraw:[], // 4 randomly drawn situations for current year
  qPhase:'decision',
  sel:null,
  qCons:[],qTree:[],
  trustAtQStart:0,
  trustAtYearStart:0,
  apAtYearStart:0,partAtYearStart:0,engAtYearStart:0,
  decisionLog:[], // [{year,q,title,badge,note}] full game history for closing summary
  charArcs:{theo:0,aisha:0,ben:0,maya:0,sam:0,noah:0,dana:0}, // arc stage per character 0-3
  guaranteedAnchorId:null, // one id from EXEC_DISAGREEMENT_IDS, chosen per game — see drawYearSituations
  soundOn:true,
  yearHistory:[], // [{year,ap,part,eng,grade}] snapshot at each year end
  showTrending:false,
  mobPanelOpen:false, // tracked in state (not just DOM classList) so re-renders triggered
                       // by other toggles (e.g. showTrending) don't silently close it
  treeDetailsOpen:{}, // {trackId:bool} — per-track "show descriptions" toggle in the tree modal
  peopleDetailsOpen:{}, // {tier:bool} — per-tier "show stage descriptions" toggle on the postsurvey People section
  ambEv:null,pulse:null,pulseV:null,
  pendingUnlocks:[],
  yearTrustGained:0, // positive trust earned so far this year, against TRUST_ANNUAL_CAP
  trustCappedThisQ:false, // true if this quarter's positive trust was throttled by the cap

  init:function(key){
    var d=DIFF[key];
    this.diff=key; this.year=0; this.q=1; this.isTut=true;
    this.trust=d.trust; this.budget=d.budget; this.cap=d.cap;
    this.capUsed=0; this.polcap=d.polcap;
    this.eng=d.eng; this.ap=d.ap; this.part=d.part;
    this.tree={}; var self=this;
    d.tree.forEach(function(id){self.tree[id]=true;});
    this.sit=null; this.sitDone=false; this.qPhase='decision';
    this.sel={}; this.qCons=[]; this.qTree=[];
    this.trustAtQStart=d.trust;
    this.trustAtYearStart=d.trust;
    this.apAtYearStart=d.ap;this.partAtYearStart=d.part;this.engAtYearStart=d.eng;
    this.decisionLog=[];
    this.charArcs={theo:0,aisha:0,ben:0,maya:0,sam:0,noah:0,dana:0};
    this.yearHistory=[];this.showTrending=false;this.treeDetailsOpen={};this.mobPanelOpen=false;this.peopleDetailsOpen={};
    this.guaranteedAnchorId=EXEC_DISAGREEMENT_IDS[Math.floor(Math.random()*EXEC_DISAGREEMENT_IDS.length)];
    this.soundOn=true;
    this.ambEv=null; this.pulse=null; this.pulseV=null;
    this.pendingUnlocks=[];
    this.yearTrustGained=0; this.trustCappedThisQ=false;
    this.phase='ob';
  },

  getZone:function(){
    for(var i=0;i<ZONES.length;i++){var z=ZONES[i];if(this.trust>=z.min&&this.trust<=z.max)return z;}
    return ZONES[0];
  },
  adjTrust:function(d){
    var oldZone=this.getZone().id;
    this.trust=Math.max(5,Math.min(100,this.trust+d));
    var newZone=this.getZone().id;
    if(newZone!==oldZone)setTimeout(function(){AUDIO.zoneShift(newZone);},200);
  },
  // Routes a trust change through the same annual cap as quarterly gains (grade-shift,
  // recommendation landings). Losses pass through uncapped.
  applyCappedTrust:function(delta){
    var cap=TRUST_ANNUAL_CAP[this.diff];
    if(cap==null||delta<=0){ this.adjTrust(delta); return; }
    var remaining=Math.max(0,cap-this.yearTrustGained);
    var applied=Math.min(delta,remaining);
    this.yearTrustGained+=applied;
    this.adjTrust(applied);
  },
  remCap:function(){return this.cap-this.capUsed;},
  spendCap:function(n){this.capUsed=Math.min(this.cap,this.capUsed+n);},
  spendBud:function(n){this.budget=Math.max(0,this.budget-n);},
  hasNode:function(id){return !!this.tree[id];},
  clamp100:function(v){return Math.max(0,Math.min(100,v));},

  checkReq:function(opt){
    // Capacity check applies to every option regardless of req
    if(opt.slots&&this.remCap()<opt.slots){
      return{met:false,why:'Requires '+opt.slots+' capacity (have '+this.remCap()+')'};
    }
    if(!opt.req)return{met:true,why:null};
    var r=opt.req;
    if(r.zone&&ZONE_ORDER.indexOf(this.getZone().id)<ZONE_ORDER.indexOf(r.zone))return{met:false,why:'Requires '+r.zone+' Closeness'};
    if(r.pc&&this.polcap<r.pc)return{met:false,why:'Requires '+r.pc+' PC &#8212; earn through strong decisions, grades, and positive events'};
    if(r.node&&!this.hasNode(r.node))return{met:false,why:'Requires '+(NODES[r.node]?NODES[r.node].name:r.node)};
    if(r.noNode&&this.hasNode(r.noNode))return{met:false,why:null};
    return{met:true,why:null};
  },

  findSitById:function(sitId){
    // Search tutorial SITS, current year draw, and all pools (for safety)
    for(var i=0;i<SITS.length;i++){if(SITS[i].id===sitId)return SITS[i];}
    for(var j=0;j<this.yearDraw.length;j++){if(this.yearDraw[j]&&this.yearDraw[j].id===sitId)return this.yearDraw[j];}
    var yrs=Object.keys(YEAR_POOLS);
    for(var y=0;y<yrs.length;y++){
      var pool=YEAR_POOLS[yrs[y]];
      for(var k=0;k<pool.length;k++){if(pool[k].id===sitId)return pool[k];}
    }
    return null;
  },

  resolveOpt:function(sitId,optId){
    var sit=this.findSitById(sitId);
    var opt=null;
    if(sit){for(var j=0;j<sit.opts.length;j++){if(sit.opts[j].id===optId){opt=sit.opts[j];break;}}}
    if(!opt)return;
    if(opt.slots)this.spendCap(opt.slots);
    if(opt.bud)this.spendBud(opt.bud);
    if(opt.pc)this.polcap=Math.max(0,this.polcap-opt.pc);

    var trustDelta=opt.con.trust||0;
    var apDelta=opt.con.ap||0;
    var partDelta=opt.con.part||0;
    var noteText=opt.con.note||'';

    // VARIANCE: outcome has randomness layered on the base consequence
    if(opt.variance){
      var roll=Math.random();
      var varianceBonus=roll<0.5?-1:1; // simple +/-1 swing
      trustDelta+=varianceBonus;
      noteText+=(varianceBonus>0?' It worked out.':' It did not quite land.');
    }

    // RISK CONSEQUENCE: high-commitment bet — chance the payoff is replaced by the downside
    if(opt.riskConsequence){
      if(Math.random()<0.4){
        trustDelta=opt.riskConsequence.trust||0;
        apDelta=0;partDelta=0;
        noteText='The case did not hold up under scrutiny. It backfired.';
      } else {
        noteText+=' The data held up.';
      }
    }

    this.qCons.push({trust:trustDelta,ap:apDelta,part:partDelta,pc:(opt.pc?-opt.pc:0),note:noteText,badge:opt.badge,source:'decision'});
    this.decisionLog.push({year:this.year,q:this.q,title:sit.title,badge:opt.badge,note:noteText});
    // Check if this decision advances a character arc
    this.checkArcAdvance(sit.char, sitId);

    // PC GAIN: some options grant Political Capital instead of spending it
    if(opt.pcGain){
      this.polcap=Math.min(100,this.polcap+opt.pcGain);
    }

    // CONTRACTOR HIRE: temp capacity boost for 2 quarters
    if(opt.contractorHire){
      this.cap+=1;
      this.contractorQuartersLeft=2;
    }

    if(opt.treeUnlock&&!this.hasNode(opt.treeUnlock)){
      this.qTree.push({id:opt.treeUnlock,node:NODES[opt.treeUnlock]});
    }
    this.sitDone=true; this.qPhase='build';
  },

  canBuild:function(id){
    var n=NODES[id]; if(!n||this.hasNode(id))return false;
    if(this.budget<n.cost)return false;
    if(this.remCap()<1)return false;
    // Phase lock: L1 available Year 0+, L2 Year 2+, L3 Year 3+, L4 Year 4+
    var minYear=(n.phase||1)-1;
    if(this.year<minYear)return false;
    for(var i=0;i<n.pre.length;i++){if(!this.hasNode(n.pre[i]))return false;}
    return true;
  },

  toggleSel:function(id){
    if(!NODES[id]||this.hasNode(id))return;
    if(this.sel[id]){delete this.sel[id];}
    else{
      var selIds=Object.keys(this.sel);
      var selCost=0;
      for(var i=0;i<selIds.length;i++){selCost+=(NODES[selIds[i]]?NODES[selIds[i]].cost:0);}
      var selSlots=selIds.length;
      if(selSlots+1>this.remCap())return;
      if(selCost+(NODES[id].cost)>this.budget)return;
      var n=NODES[id];
      var ok=true;
      for(var j=0;j<n.pre.length;j++){if(!this.hasNode(n.pre[j])){ok=false;break;}}
      if(!ok)return;
      this.sel[id]=true;
    }
  },

  commitSel:function(){
    var ids=Object.keys(this.sel);
    for(var i=0;i<ids.length;i++){
      var id=ids[i];
      if(this.canBuild(id)){
        this.spendBud(NODES[id].cost);
        this.spendCap(1);
        this.tree[id]=true;
        this.qTree.push({id:id,node:NODES[id]});
        this.pendingUnlocks.push(id);
      }
    }
    this.checkTreeArcAdvance();
    AUDIO.nodeClick();
    this.sel={};
  },

  applyQueued:function(){
    this.trustAtQStart=this.trust;

    // Annual trust cap: every positive-trust source (decisions, ambient, node effects) draws
    // from one shared per-year budget. Losses are never throttled. Scaling happens here, before
    // anything is displayed, so the resolve screen always shows the real, already-capped number.
    var cap=TRUST_ANNUAL_CAP[this.diff];
    this.trustCappedThisQ=false;
    var treeEffectScale=1;
    if(cap!=null){
      var remaining=Math.max(0,cap-this.yearTrustGained);
      var positiveTotal=0,i,j;
      for(i=0;i<this.qCons.length;i++){if(this.qCons[i].trust>0)positiveTotal+=this.qCons[i].trust;}
      for(j=0;j<this.qTree.length;j++){var e=this.qTree[j].node.effect;if(e&&e.trust>0)positiveTotal+=e.trust;}
      var scale=(positiveTotal>remaining&&positiveTotal>0)?remaining/positiveTotal:1;
      if(scale<1){
        this.trustCappedThisQ=true;
        for(i=0;i<this.qCons.length;i++){if(this.qCons[i].trust>0)this.qCons[i].trust=Math.round(this.qCons[i].trust*scale);}
        treeEffectScale=scale;
      }
      this.yearTrustGained+=Math.min(positiveTotal,remaining);
    }

    // Trust is summed and applied as ONE adjTrust call (not one per entry) so the floor/ceiling
    // clamp only ever happens once per quarter — otherwise a bad quarter's later entries could
    // get silently absorbed by an earlier floor-out, leaving the displayed chips (which show
    // each entry's own number) adding up to more than the bar actually moved.
    var trustTotal=0;
    for(var i=0;i<this.qCons.length;i++){
      var c=this.qCons[i];
      if(c.trust)trustTotal+=c.trust;
      if(c.ap)this.ap=this.clamp100(this.ap+c.ap);
      if(c.part)this.part=this.clamp100(this.part+c.part);
    }
    for(var j=0;j<this.qTree.length;j++){
      var t=this.qTree[j];
      if(!this.tree[t.id]){this.tree[t.id]=true;this.pendingUnlocks.push(t.id);}
      var eff=t.node.effect;
      if(eff){
        if(eff.trust)trustTotal+=(eff.trust>0?Math.round(eff.trust*treeEffectScale):eff.trust);
        if(eff.ap)this.ap=this.clamp100(this.ap+eff.ap);
        if(eff.part)this.part=this.clamp100(this.part+eff.part);
      }
    }
    if(trustTotal)this.adjTrust(trustTotal);
    // Recalc engagement every quarter: weighted composite of ap and part
    this.eng=this.clamp100(Math.round(this.ap*0.55+this.part*0.45));
  },

  checkArcAdvance:function(charId, sitId){
    if(!charId||!CHAR_ARCS[charId]||!this.tree)return;
    var arc=CHAR_ARCS[charId];
    var stage=this.charArcs[charId]||0;
    if(stage>=3)return; // already at champion
    var decisions=arc.advanceOn.decisions||[];
    var track=arc.advanceOn.track;
    // Advance if: this decision is one of their key decisions, AND track has at least (stage+1) nodes built
    var decisionMatch=decisions.indexOf(sitId)>=0;
    var builtCount=Object.keys(this.tree||{}).filter(function(id){return id.indexOf(track)===0;}).length;
    if(decisionMatch&&builtCount>stage){
      this.charArcs[charId]=stage+1;
    }
  },

  checkTreeArcAdvance:function(){
    // Called after building a node - check if any arc should advance based on tree progress alone
    var self=this;
    Object.keys(CHAR_ARCS).forEach(function(charId){
      var arc=CHAR_ARCS[charId];
      var stage=self.charArcs[charId]||0;
      if(stage>=3)return;
      var track=arc.advanceOn.track;
      var builtCount=Object.keys(self.tree||{}).filter(function(id){return id.indexOf(track)===0;}).length;
      // Advance one stage per 2 nodes built in the relevant track, max based on decisions too
      var treeStage=Math.min(3,Math.floor(builtCount/2));
      if(treeStage>stage)self.charArcs[charId]=treeStage;
    });
  },

  getCharAmbientEvents:function(){
    // Return arc-appropriate ambient events for each character
    var self=this;
    var events=[];
    Object.keys(CHAR_ARCS).forEach(function(charId){
      var arc=CHAR_ARCS[charId];
      var stage=self.charArcs[charId]||0;
      var pos=arc.posEvents[stage]||[];
      var neg=arc.negEvents[stage]||[];
      pos.forEach(function(e){events.push({char:charId,text:e.text,d:e.d,isPos:true});});
      neg.forEach(function(e){events.push({char:charId,text:e.text,d:e.d,isPos:false});});
    });
    return events;
  },

  checkStagnation:function(){
    if(this.year===0)return; // no penalty in tutorial
    // Was anything buildable this quarter?
    var anyBuildable=false;
    var ts=this.treeStatus();
    var tracks=['infra','mgr','comms','se'];
    for(var ti=0;ti<tracks.length;ti++){
      var nodes=ts[tracks[ti]];
      for(var ni=0;ni<nodes.length;ni++){
        if(nodes[ni].avail&&this.canBuild(nodes[ni].id)){anyBuildable=true;break;}
      }
      if(anyBuildable)break;
    }
    if(!anyBuildable)return; // nothing to build = no penalty (budget/phase constrained)
    // Did they build anything?
    var builtThisQ=this.qTree.length>0;
    if(builtThisQ)return; // invested = no penalty
    // Didn't build. Check if they also chose a zero-slot decision
    var decisionCons=this.qCons.filter(function(c){return c.source==='decision';});
    var choseFreePath=decisionCons.length>0&&decisionCons.every(function(c){return !c.slots;});
    var penalty=choseFreePath?-2:-1;
    // Pushed only — applyQueued (called after this) sums it into the quarter's single combined
    // trust delta, so a floor/ceiling clamp can't happen here and again independently there.
    this.qCons.push({trust:penalty,ap:0,part:0,pc:0,
      note:'Nothing invested or actioned this quarter. The organization noticed.',
      badge:'STAGNATION',source:'ambient'});
  },

  genAmbient:function(){
    var z=this.getZone();
    var pw=z.id==='champion'?.65:z.id==='engaged'?.55:z.id==='building'?.50:z.id==='cautious'?.45:.20;
    var arcEvents=this.getCharAmbientEvents();
    var posPool=POS_EVENTS.concat(arcEvents.filter(function(e){return e.isPos;}));
    var negPool=NEG_EVENTS.concat(arcEvents.filter(function(e){return !e.isPos;}));
    var pool=Math.random()<pw?posPool:negPool;
    var self=this;
    var el=pool.filter(function(e){return !e.cond||(e.cond.node?self.hasNode(e.cond.node):true);});
    if(!el.length)return;
    var ev=el[Math.floor(Math.random()*el.length)];
    this.ambEv=ev;
    this.qCons.push({trust:ev.d,ap:0,part:0,pc:0,note:ev.text,badge:'ORG',source:'ambient',char:ev.char||null});
    this.polcap=Math.min(100,this.polcap+z.rate);
  },

  genPulse:function(){
    var start=DIFF[this.diff].ap;
    var delta=this.ap-start;
    var pool,v;
    if(delta>3){pool=PULSES.pos;v='pos';}
    else if(delta<-2){pool=PULSES.neg;v='neg';}
    else if(this.getZone().id==='skeptical'&&Math.random()<.6){pool=PULSES.neg;v='neg';}
    else{pool=PULSES.neu;v='neu';}
    this.pulse=pool[Math.floor(Math.random()*pool.length)];
    this.pulseV=v;
  },

  getPreSurvey:function(yr){
    if(yr===0){
      for(var i=0;i<PRE_SURVEY.length;i++){if(PRE_SURVEY[i].year===0)return PRE_SURVEY[i];}
      return null;
    }
    return YEAR_PRESURVEY[yr]||null;
  },

  drawYearSituations:function(yr){
    var pool=YEAR_POOLS[yr];
    if(!pool||!pool.length){this.yearDraw=[];return;}
    // Exactly one situation across the WHOLE game is guaranteed to draw: whichever
    // id was randomly chosen as this playthrough's guaranteedAnchorId (see S.init).
    // Fisher-Yates shuffles the remaining pool to fill the rest of the 4 slots, so
    // that single "must-see" moment isn't left to the draw lottery, but every other
    // year's draw (including the other 4 exec-disagreement candidates) is fully random.
    var self=this;
    var anchors=pool.filter(function(s){return s.id===self.guaranteedAnchorId;});
    var rest=pool.filter(function(s){return s.id!==self.guaranteedAnchorId;});
    var arr=rest.slice();
    for(var i=arr.length-1;i>0;i--){
      var j=Math.floor(Math.random()*(i+1));
      var tmp=arr[i];arr[i]=arr[j];arr[j]=tmp;
    }
    var need=Math.max(0,4-anchors.length);
    var draw=anchors.concat(arr.slice(0,need));
    // Shuffle the final order so the anchor doesn't always land in the same quarter.
    for(var k=draw.length-1;k>0;k--){
      var jj=Math.floor(Math.random()*(k+1));
      var t=draw[k];draw[k]=draw[jj];draw[jj]=t;
    }
    this.yearDraw=draw;
  },

  treeStatus:function(){
    var t={infra:[],mgr:[],comms:[],se:[]};
    var self=this;
    Object.keys(NODES).forEach(function(id){
      var n=NODES[id];
      var preOk=true;
      for(var i=0;i<n.pre.length;i++){if(!self.hasNode(n.pre[i])){preOk=false;break;}}
      var phaseOk=(self.year>=((n.phase||1)-1));
      var built=self.hasNode(id);
      var avail=!built&&preOk&&phaseOk;
      var phaseLocked=!built&&phaseOk===false;
      var locked=!built&&!preOk;
      t[n.track].push({id:id,icon:n.icon,name:n.name,unlocks:n.unlocks,cost:n.cost,
        phase:n.phase||1,pre:n.pre,level:n.level,
        built:built,avail:avail,locked:locked||phaseLocked,
        phaseLocked:phaseLocked,prereqLocked:locked});
    });
    Object.keys(t).forEach(function(k){t[k].sort(function(a,b){return a.level-b.level;});});
    return t;
  }
};

  // Shared line chart for a single stat across years — a trend is a
  // continuous time series, so a line reads more naturally than bars.
  // Used by both the in-game "show trending" drawer and the closing screen.
  // Handles a single data point (n===1) by drawing just the one dot.
  makeLineChart:function(data,color,label,unit){
    unit=unit||'';
    var W=180,H=90,pad=28,bpad=20;
    var vals=data.map(function(d){return d.v;});
    var minV=Math.max(0,Math.min.apply(null,vals)-5);
    var maxV=Math.min(100,Math.max.apply(null,vals)+5);
    var range=maxV-minV||1;
    var n=data.length;
    var pts=data.map(function(d,i){
      var x=n>1?pad+(i/(n-1))*(W-pad-8):pad+(W-pad-8)/2;
      var y=pad+(1-(d.v-minV)/range)*(H-pad-bpad);
      return {x:x,y:y,v:d.v,yr:d.yr};
    });
    var path=pts.map(function(p,i){return (i===0?'M':'L')+p.x.toFixed(1)+','+p.y.toFixed(1);}).join(' ');
    var svg='<svg width="'+W+'" height="'+H+'" style="overflow:visible">';
    svg+='<line x1="'+pad+'" y1="'+pad+'" x2="'+pad+'" y2="'+(H-bpad)+'" stroke="rgba(255,255,255,.06)" stroke-width="1"/>';
    svg+='<line x1="'+pad+'" y1="'+(H-bpad)+'" x2="'+(W-8)+'" y2="'+(H-bpad)+'" stroke="rgba(255,255,255,.06)" stroke-width="1"/>';
    svg+='<text x="'+pad+'" y="14" fill="'+color+'" font-size="9" font-family="monospace" letter-spacing="1">'+label.toUpperCase()+'</text>';
    if(n>1){
      svg+='<path d="'+path+'" fill="none" stroke="'+color+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
      var areaPath=path+' L'+pts[pts.length-1].x.toFixed(1)+','+(H-bpad)+' L'+pts[0].x.toFixed(1)+','+(H-bpad)+' Z';
      svg+='<path d="'+areaPath+'" fill="'+color+'" opacity="0.08"/>';
    }
    pts.forEach(function(p,i){
      svg+='<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="3" fill="'+color+'"/>';
      var anchor=i===0?'start':i===pts.length-1?'end':'middle';
      var yOff=p.y<pad+12?12:-6;
      svg+='<text x="'+p.x.toFixed(1)+'" y="'+(p.y+yOff).toFixed(1)+'" fill="'+color+'" font-size="8" font-family="monospace" text-anchor="'+anchor+'">'+p.v+unit+'</text>';
      svg+='<text x="'+p.x.toFixed(1)+'" y="'+(H-6)+'" fill="rgba(255,255,255,.3)" font-size="7" font-family="monospace" text-anchor="middle">Y'+p.yr+'</text>';
    });
    svg+='</svg>';
    return svg;
  },

    for(var ti=0;ti<trackOrder.length;ti++){
      var tk=trackOrder[ti];var tr=TRACKS[tk];var nodes=ts[tk];
      html+='<div class="ts-track"><div class="ts-track-name" style="color:'+tr.color+'">'+tr.icon+' '+tr.name+'</div><div class="ts-nodes">';
      for(var ni=0;ni<nodes.length;ni++){
        var n=nodes[ni];
        var cls=n.built?'built':n.avail?'avail':'locked';
        html+='<div class="ts-node '+cls+'" id="node-'+n.id+'" title="'+n.name+'">'+n.icon+'</div>';
      }
      html+='</div></div>';
    }
    html+='</div><button class="tree-view-btn" onclick="C.openTree()">View full tree &#8594;</button></div>';
    // Characters section — replaces Resources. Grouped by tier (core vs wide)
    // since Core Crew and Wider Circle aren't the same closeness, even though
    // Closeness itself stays one number.
    html+='<div class="ls"><div class="ls-lbl">People</div>';
    [['core','Core Crew'],['wide','Wider Circle']].forEach(function(grp){
      var tier=grp[0],label=grp[1];
      html+='<div style="font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">'+label+'</div>';
      tierIds(tier).forEach(function(charId){
        var arc=CHAR_ARCS[charId];
        var ch=CHARS[charId];
        var stage=S.charArcs[charId]||0;
        var stageInfo=arc.stages[stage];
        html+='<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:10px;cursor:pointer" onclick="C.openCompany()" title="View bio">';
        html+='<span style="font-size:18px;flex-shrink:0">'+ch.av+'</span>';
        html+='<div>';
        html+='<div style="font-size:12px;font-weight:600;color:var(--t2)">'+ch.name+'</div>';
        html+='<div style="font-size:10px;color:var(--tm)">'+ch.role+'</div>';
        html+='<div style="font-size:10px;color:var(--green);margin-top:1px">'+stageInfo.label+'</div>';
        html+='</div></div>';
      });
    });
    html+='</div>';
    return html;
  },

  rightPanel:function(){
    if(S.qPhase==='decision'){
      if(S.sit)return this.sitCard(S.sit);
      return this.noSituation();
    }
    if(S.qPhase==='build')return this.buildMode();
    if(S.qPhase==='resolve')return this.resolveMode();
    return '';
  },

  sitCard:function(sit){
    var ch=sit.char?CHARS[sit.char]:null;
    var html='<div class="sit-card">';
    html+='<div class="sit-hdr">';
    if(ch){
      html+='<div class="char-badge"><div class="char-av">'+ch.av+'</div><div><div class="char-name">'+ch.name+'</div><div class="char-role">'+ch.role+'</div></div></div>';
    } else {
      html+='<div class="char-badge"><div class="char-av">&#128172;</div><div><div class="char-name">The Group</div><div class="char-role">A call only you can make</div></div></div>';
    }
    if(sit.tut)html+='<div class="tut-badge">&#128065; Consequences visible this round</div>';
    html+='</div>';
    html+='<div class="sit-title">'+sit.title+'</div>';
    html+='<div class="sit-scenario">'+sit.scenario+'</div>';
    html+='<div class="sit-opts">';
    for(var i=0;i<sit.opts.length;i++){
      var o=sit.opts[i];
      var r=S.checkReq(o);
      if(!r.met&&r.why===null)continue;
      var lk=!r.met;
      html+='<div class="sit-opt'+(lk?' lk':'')+'" '+(lk?'':'onclick="C.choose(\''+sit.id+'\',\''+o.id+'\')"')+'>';
      html+='<div class="opt-top"><span class="opt-badge'+(lk?' lk':'')+'">'+o.badge+'</span><div class="opt-costs">';
      if(o.slots)html+='<span class="cc slot">'+o.slots+' slot'+(o.slots>1?'s':'')+'</span>';
      if(o.bud)html+='<span class="cc bud">$'+o.bud+'</span>';
      if(o.pc)html+='<span class="cc pc">&#10024;'+o.pc+'</span>';
      if(o.treeUnlock)html+='<span class="cc unlock">&#127807; '+(NODES[o.treeUnlock]?NODES[o.treeUnlock].name:'')+'</span>';
      html+='</div></div>';
      html+='<div class="opt-text">'+o.text+'</div>';
      if(lk&&r.why)html+='<div class="opt-lock">&#128274; '+r.why+'</div>';
      if(sit.tut&&!lk&&o.con.note)html+='<div class="opt-preview">'+o.con.note+'</div>';
      html+='</div>';
    }
    html+='</div></div>';
    return html;
  },

  buildMode:function(){
    var rem=S.remCap();
    if(rem<1)return '<div class="build-mode"><div class="build-done">&#9889; No capacity remaining this quarter.</div>'+this.advBtn()+'</div>';
    var ts=S.treeStatus();
    // Check if anything is actually affordable/available right now
    var anyBuildable=false;
    ['infra','mgr','comms','se'].forEach(function(tk){
      ts[tk].forEach(function(n){ if(n.avail&&S.canBuild(n.id))anyBuildable=true; });
    });
    if(!anyBuildable){
      // Auto-resolve — no point making player click through
      // Use setTimeout so the render cycle completes first
      var self=this;
      setTimeout(function(){C.skipBuild();},0);
      setTimeout(function(){C.goToResolve();},80);
      return '<div class="build-mode"><div class="build-done" style="color:var(--tm)">&#128274; Nothing buildable this quarter.</div></div>';
    }
    var selIds=Object.keys(S.sel);
    var selCost=0;
    for(var si=0;si<selIds.length;si++){selCost+=(NODES[selIds[si]]?NODES[selIds[si]].cost:0);}
    var selSlots=selIds.length;
    var canCommit=selIds.length>0;
    var html='<div class="build-mode">';
    html+='<div class="build-hdr"><div class="build-title">Invest in your tree</div><button class="build-skip" onclick="C.skipBuild()">Skip</button></div>';
    // Basket
    html+='<div class="basket"><div class="basket-chips">';
    if(selIds.length){
      for(var bi=0;bi<selIds.length;bi++){
        var bid=selIds[bi];var bn=NODES[bid];
        if(bn)html+='<span class="basket-chip" onclick="C.toggleNode(\''+bid+'\')">'+bn.icon+' '+bn.name+' &#215;</span>';
      }
    } else {
      html+='<span class="basket-empty">Tap a node to select it</span>';
    }
    html+='</div><div class="basket-right">';
    if(selIds.length){var slotStr=selSlots===1?' slot':' slots';var costStr2=selCost>=1000?'$'+(selCost/1000)+'K':'$'+selCost;html+='<span class="basket-cost">'+selSlots+slotStr+' &#183; '+costStr2+'</span>';}
    html+='<button class="btn-commit" '+(canCommit?'onclick="C.commitInvestments()"':'disabled')+'>Invest &#8594;</button>';
    html+='</div></div>';
    // Tracks
    html+='<div class="tracks-grid">';
    var trackOrder=['infra','mgr','comms','se'];
    for(var ti=0;ti<trackOrder.length;ti++){
      var tk=trackOrder[ti];var tr=TRACKS[tk];var nodes=ts[tk];
      var detailsOpen=!!S.treeDetailsOpen[tk];
      html+='<div class="track-block" style="border-color:'+tr.color+'22">';
      html+='<div class="track-hdr" style="background:'+tr.color+'0D;border-bottom:2px solid '+tr.color+'44">';
      html+='<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:3px">';
      html+='<div style="display:flex;align-items:center;gap:8px"><span>'+tr.icon+'</span><span class="track-name" style="color:'+tr.color+'">'+tr.name+'</span></div>';
      html+='<button onclick="C.toggleTreeDetails(\''+tk+'\')" style="background:none;border:1px solid '+tr.color+'44;border-radius:var(--rs);padding:2px 8px;font-size:10px;color:'+tr.color+';cursor:pointer;font-family:var(--sans);flex-shrink:0">'+(detailsOpen?'Hide details &#9650;':'Details &#9660;')+'</button>';
      html+='</div>';
      html+='<div class="track-focus" style="color:'+tr.color+'99">'+tr.focus+'</div>';
      html+='<div class="track-when">'+tr.when+'</div></div>';
      html+='<div class="track-nodes">';
      for(var ni=0;ni<nodes.length;ni++){
        var n=nodes[ni];
        var isSelected=!!S.sel[n.id];
        var wouldExceedCap=!isSelected&&(selSlots+1>rem);
        var wouldExceedBud=!isSelected&&(selCost+n.cost>S.budget);
        var canToggle=n.avail&&(isSelected||(!wouldExceedCap&&!wouldExceedBud));
        var crossDep=false;
        for(var pi=0;pi<n.pre.length;pi++){if(NODES[n.pre[pi]]&&NODES[n.pre[pi]].track!==tk){crossDep=true;break;}}
        var costStr=n.cost>=1000?'$'+n.cost/1000+'K':'$'+n.cost;
        var stateCls=n.built?'built':n.avail?(isSelected?'sel':canToggle?'avail':'dimmed'):'locked';
        var nodeStyle=isSelected?'style="border:2px solid '+tr.color+';background:'+tr.color+'15"':'';
        html+='<div class="tn '+stateCls+'" id="tn-'+n.id+'" '+nodeStyle+(n.avail?' onclick="C.toggleNode(\''+n.id+'\')"':'')+' title="'+n.name+'">';
        if(n.built)html+='<div class="tn-check" style="color:'+tr.color+'">&#10003;</div>';
        else if(isSelected)html+='<div class="tn-check" style="color:'+tr.color+'">&#10003;</div>';
        html+='<div class="tn-icon">'+n.icon+'</div>';
        html+='<div class="tn-name" style="'+(n.built?'color:'+tr.color:'')+'">'+n.name+'</div>';
        if(detailsOpen)html+='<div class="tn-unlocks">'+n.unlocks+'</div>';
        if(!n.built){
          if(n.avail){
            html+='<div class="tn-costs"><span class="cc bud">'+costStr+'</span><span class="cc slot">&#9679; slot</span></div>';
            if(crossDep)html+='<div class="tn-cross">&#8599; cross-track req</div>';
            if(!canToggle&&!isSelected){
              if(wouldExceedCap)html+='<div class="tn-blocked">No capacity</div>';
              else if(wouldExceedBud)html+='<div class="tn-blocked">Need '+costStr+'</div>';
            }
          } else {
            var missing=[];
            for(var mi=0;mi<n.pre.length;mi++){if(!S.hasNode(n.pre[mi]))missing.push(NODES[n.pre[mi]]?NODES[n.pre[mi]].name:n.pre[mi]);}
            var lockMsg=missing.length?missing.join(', '):('Available Year '+((n.phase||1)-1));
            html+='<div class="tn-locked-msg">&#128274; '+lockMsg+'</div>';
          }
        }
        html+='</div>';
      }
      html+='</div></div>';
    }
    html+='</div></div>';
    return html;
  },

  // Shared trust-bar-with-movement block, used on the resolve, postsurvey, and
  // closing screens so a trust delta always reads the same way everywhere.
  trustBarBlock:function(tBefore,suffix){
    var z=S.getZone();
    var tAfter=S.trust;
    var tDelta=tAfter-tBefore;
    var deltaPos=tDelta>=0;
    var deltaStr=(deltaPos?'+':'')+tDelta;
    var html='<div class="resolve-trust-hdr"><span class="resolve-trust-lbl">Closeness</span>';
    html+='<span class="resolve-trust-delta" style="color:'+(deltaPos?'var(--green)':'var(--red)')+'">'+deltaStr+' '+suffix+'</span></div>';
    html+='<div class="resolve-bar">';
    if(tDelta!==0){
      var trailLeft=Math.min(tBefore,tAfter);
      html+='<div class="resolve-bar-trail" style="left:'+trailLeft+'%;width:'+Math.abs(tDelta)+'%;background:'+(deltaPos?'color-mix(in srgb, var(--green) 25%, transparent)':'color-mix(in srgb, var(--red) 25%, transparent)')+'"></div>';
    }
    html+='<div class="resolve-bar-fill" style="width:'+tAfter+'%;background:'+ZONE_FLUID[z.id]+'"></div>';
    html+='</div>';
    html+='<div class="resolve-zone-lbl" style="color:'+z.color+'">'+z.label+'</div>';
    return html;
  },

  resolveMode:function(){
    var vi=S.pulseV||'neu';
    var picons={pos:'&#8593;',neu:'&#8594;',neg:'&#8595;'};
    var html='<div class="resolve-card" id="rc-main">';
    html+=this.trustBarBlock(S.trustAtQStart,'this quarter');
    // Causal narrative — what happened and why, one line each
    var anyItems=false;
    var causeHtml='<div style="display:flex;flex-direction:column;gap:10px;margin-top:12px">';
    for(var i=0;i<S.qCons.length;i++){
      var c=S.qCons[i];
      if(!c.note&&!c.trust&&!c.ap&&!c.part)continue;
      anyItems=true;
      // AP Optimism / Participation only ever move visibly at survey results —
      // they still update underneath every quarter, but showing the tick here
      // would break the "it's a survey, not a live dashboard" premise. Trust
      // (an ongoing standing, not a survey metric) and PC still show.
      var parts=[];
      if(c.trust)parts.push('Trust '+(c.trust>0?'+':'')+c.trust);
      if(c.pc)parts.push('Goodwill '+(c.pc>0?'+':'')+c.pc);
      var allPos=c.trust>=0&&(c.pc||0)>=0;
      var tagCls=c.source==='ambient'?'org':'dec';
      causeHtml+='<div style="display:flex;gap:9px;align-items:flex-start">';
      // Just the name, not the full title — the role is already visible in the
      // People panel and mobile dashboard, so spelling it out here again read as
      // repetitive/"tacky" rather than helpful.
      var tagLabel=(c.char&&CHARS[c.char])?CHARS[c.char].name.toUpperCase():c.badge;
      causeHtml+='<span class="cause-tag '+tagCls+'" style="flex-shrink:0;margin-top:1px">'+tagLabel+'</span>';
      causeHtml+='<div style="flex:1">';
      if(c.note)causeHtml+='<div style="font-size:12px;color:var(--t2);line-height:1.5">'+c.note+'</div>';
      if(parts.length)causeHtml+='<div style="font-family:var(--mono);font-size:11px;color:'+(allPos?'var(--green)':'var(--red)')+';margin-top:3px">'+parts.join(' &#183; ')+'</div>';
      causeHtml+='</div></div>';
    }
    // Tree investments - show compact chip only (full detail in tree panel)
    if(S.qTree.length>0){
      anyItems=true;
      var builtNames=S.qTree.map(function(t){return t.node.icon+' '+t.node.name;}).join(', ');
      causeHtml+='<div style="display:flex;gap:9px;align-items:center">';
      causeHtml+='<span class="cause-tag" style="flex-shrink:0;background:color-mix(in srgb, var(--green) 12%, transparent);color:var(--green);border-color:color-mix(in srgb, var(--green) 30%, transparent)">BUILT</span>';
      causeHtml+='<span style="font-size:11px;color:var(--green)">'+builtNames+'</span>';
      causeHtml+='</div>';
    }
    // Tree skip note: if nothing built this quarter, explain why
    if(S.qTree.length===0&&S.qPhase==='resolve'&&!S.isTut){
      var ts=S.treeStatus();
      var hadBuildable=false;
      var tracks=['infra','mgr','comms','se'];
      for(var ti=0;ti<tracks.length;ti++){
        var tnodes=ts[tracks[ti]];
        for(var tni=0;tni<tnodes.length;tni++){
          if(tnodes[tni].avail&&S.canBuild(tnodes[tni].id)){hadBuildable=true;break;}
        }
        if(hadBuildable)break;
      }
      anyItems=true;
      if(!hadBuildable){
        causeHtml+='<div style="display:flex;gap:9px;align-items:flex-start">';
        causeHtml+='<span class="cause-tag" style="flex-shrink:0;margin-top:1px;background:rgba(148,138,118,.1);color:var(--tm);border-color:rgba(148,138,118,.3)">TREE</span>';
        causeHtml+='<div style="flex:1;font-size:12px;color:var(--tm);line-height:1.5">Nothing buildable this quarter &#8212; budget or phase constraints.</div>';
        causeHtml+='</div>';
      }
    }
    causeHtml+='</div>';
    if(anyItems)html+=causeHtml;
    html+='</div>';
    // Pulse — sequential reveal
    html+='<div class="resolve-card" id="rc-pulse">';
    if(S.pulse){
      html+='<div class="pulse-card '+vi+'"><span class="pulse-lbl">Grapevine</span><span class="pulse-ind">'+picons[vi]+'</span><span class="pulse-txt">'+S.pulse+'</span></div>';
    }
    html+='</div>';
    html+=this.advBtn();
    return html;
  },

  noSituation:function(){
    // No situation this quarter - go straight to build phase
    // Called when qPhase is 'decision' but no sit exists
    // Immediately transition to build
    S.sitDone=true;
    S.qPhase='build';
    return this.buildMode();
  },

  advBtn:function(){
    var last=S.q===4;
    return '<div class="adv-wrap"><button class="btn-adv" onclick="C.advance()">'+(last?'Before the Check-in &#8594;':'Advance to Q'+(S.q+1)+' &#8594;')+'</button></div>';
  },

  reveal:function(){
    var isOrientation=(S.year===0);
    var ps=S.preSurveyNote;
    var html='<div class="screen" style="justify-content:center;align-items:center;text-align:center">';
    html+='<div class="reveal-badge">'+(isOrientation?'YEAR 0 COMPLETE':'YEAR '+S.year+' CHECK-IN')+'</div>';
    html+='<div class="reveal-scores">';

  presurvey:function(){
    var ps=S.getPreSurvey(S.year);
    var z=S.getZone();
    var html='<div class="screen" style="max-width:600px">';
    html+='<div style="font-family:var(--mono);font-size:10px;letter-spacing:.15em;color:var(--amber);text-transform:uppercase">BEFORE THE CHECK-IN &#183; Year '+S.year+'</div>';
    html+='<div style="font-size:12px;color:var(--tm);margin-top:4px;font-family:var(--mono)">The check-in happens next. One call before it does.</div>';
    if(ps){
      html+='<div style="background:var(--panel);border:1px solid var(--border);border-radius:var(--r-narr);padding:20px;display:flex;flex-direction:column;gap:14px">';
      html+='<div style="font-size:14px;color:var(--t2);line-height:1.65">'+ps.prompt+'</div>';
      html+='<div style="display:flex;flex-direction:column;gap:9px">';
      for(var i=0;i<ps.opts.length;i++){
        var o=ps.opts[i];
        var locked=false; var lockWhy='';
        if(o.req&&o.req.node&&!S.hasNode(o.req.node)){
          locked=true;
          lockWhy='Requires '+(NODES[o.req.node]?NODES[o.req.node].name:o.req.node);
        }
        if(o.req&&o.req.zone){
          if(ZONE_ORDER.indexOf(z.id)<ZONE_ORDER.indexOf(o.req.zone)){locked=true;lockWhy='Requires '+o.req.zone+' Closeness';}
        }
        var badgeCol=locked?'color:var(--tm);background:rgba(255,255,255,.03);border-color:var(--border)':'color:var(--amber);background:color-mix(in srgb, var(--amber) 10%, transparent);border-color:color-mix(in srgb, var(--amber) 25%, transparent)';
        // Use onclick directly - avoids post-render handler attachment bugs
        var clickAttr=locked?'':'onclick="C.choosePreSurvey(\''+o.id+'\')"';
        html+='<div '+clickAttr+' style="background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px;'+(locked?'opacity:.5;cursor:not-allowed':'cursor:pointer')+'">';
        html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">';
        html+='<span style="font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.1em;border:1px solid;border-radius:3px;padding:2px 7px;'+badgeCol+'">'+o.badge+'</span>';
        html+='</div>';
        html+='<div style="font-size:13px;color:var(--t2);line-height:1.55">'+o.text+'</div>';
        if(locked)html+='<div style="font-size:10px;color:var(--tm);font-family:var(--mono);margin-top:6px">&#128274; '+lockWhy+'</div>';
        html+='</div>';
      }
      html+='</div></div>';
    } else {
      html+='<div style="color:var(--t2);font-size:13px;line-height:1.6">No decision before this year\'s check-in.</div>';
    }
    html+='<button class="btn-g" onclick="C.skipPreSurvey()">Skip &#8594; Start Check-in</button>';
    html+='</div>';
    this.app().innerHTML=html;
  },

  postsurvey:function(){
    var g=S.grade||'C';
    var gc=GRADE_COLORS[g]||'#C08A3E';
    var nb=S.nextBudget;
    var budDelta=nb-S.budget;
    var budPos=budDelta>=0;
    var z=S.getZone();
    var focus=focusSignal(S.ap,S.part,g);
    var apD=S.ap-S.apAtYearStart;
    var partD=S.part-S.partAtYearStart;
    var engD=S.eng-S.engAtYearStart;
    function dStr(d){return d===0?'&#8212;':(d>0?'+':'')+d;}
    function dCol(d){return d>0?'var(--green)':d<0?'var(--red)':'var(--tm)';}
    var html='<div class="screen" style="max-width:640px">';
    html+='<div style="font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--amber);text-transform:uppercase">YEAR '+S.year+' &#8212; CHECK-IN</div>';
    html+='<div style="background:var(--panel);border:1px solid var(--border);border-radius:var(--r-rep);padding:18px">';
    html+=this.trustBarBlock(S.trustAtYearStart,'this year');
    html+='</div>';
    html+='<div style="background:var(--panel);border:1px solid var(--border);border-radius:var(--r-rep);padding:22px">';
    html+='<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap">';

  closing:function(){
    var z=S.getZone();
    var builtIds=Object.keys(S.tree||{});
    var builtCount=builtIds.length;
    var g=S.grade||'C';
    var gc=GRADE_COLORS[g]||'#C08A3E';

    // Group decision log by year
    var byYear={};
    S.decisionLog.forEach(function(d){
      if(!byYear[d.year])byYear[d.year]=[];
      byYear[d.year].push(d);
    });

    // Build tree summary by track
    var trackNames={infra:'Keeping the Thread',mgr:'Follow-Through',comms:'Staying in Touch',se:'Letting Them In'};
    var builtByTrack={infra:[],mgr:[],comms:[],se:[]};
    builtIds.forEach(function(id){
      var n=NODES[id];
      if(n)builtByTrack[n.track].push(n.name);
    });

    var html='<div class="screen" style="max-width:680px">';
    html+='<div class="reveal-badge">FIVE YEARS COMPLETE</div>';
    html+='<h2 style="font-size:24px;font-weight:700">The program, as you built it.</h2>';

    // Final grade summary leads — just the grade and the trust bar. AP/Part/Eng
    // numbers live in the trend charts right below (and were seen at Year 5's
    // survey results), so repeating them here was redundant.
    html+='<div style="background:var(--panel);border:1px solid var(--border);border-radius:var(--r-rep);padding:22px">';
    html+='<div style="text-align:center"><div style="font-family:var(--mono);font-size:52px;font-weight:700;color:'+gc+';line-height:1">'+g+'</div><div style="font-size:10px;color:var(--tm);text-transform:uppercase;letter-spacing:.1em;margin-top:4px">Final Grade</div></div>';
    html+='<div style="margin-top:18px;padding-top:18px;border-top:1px solid var(--border)">'+this.trustBarBlock(DIFF[S.diff].trust,'over five years')+'</div>';
    html+='</div>';

    // Year-over-year trend charts. Fixed 2x2 grid (not flex-wrap) so 4 charts
    // never wrap as an awkward 3-then-1.
    var hist=S.yearHistory||[];
    if(hist.length>1){
      html+='<div style="background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:16px">';
      html+='<div style="font-family:var(--mono);font-size:9px;letter-spacing:.15em;color:var(--tm);text-transform:uppercase;margin-bottom:12px">Year-over-Year Trends</div>';
      html+='<div class="stack-mobile" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">';
      html+=this.makeLineChart(hist.map(function(h){return {yr:h.year,v:h.trust};}), 'var(--green)', 'Closeness');
      html+=this.makeLineChart(hist.map(function(h){return {yr:h.year,v:h.ap};}), 'var(--amber)', 'Reliability');
      html+=this.makeLineChart(hist.map(function(h){return {yr:h.year,v:h.part};}), 'var(--blue)', 'Turnout', '%');
      html+=this.makeLineChart(hist.map(function(h){return {yr:h.year,v:h.eng};}), '#C7BFAE', 'Vibe');
      html+='</div></div>';
    }

    // Visual tree - nodes as filled/empty boxes by track
    var TRACK_META={infra:{name:'Keeping the Thread',color:'#5D9385',icon:TRACKS.infra.icon},mgr:{name:'Follow-Through',color:'#C08A3E',icon:TRACKS.mgr.icon},comms:{name:'Staying in Touch',color:'#BF8156',icon:TRACKS.comms.icon},se:{name:'Letting Them In',color:'#C7A24A',icon:TRACKS.se.icon}};
    html+='<div style="background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:16px">';
    html+='<div style="font-family:var(--mono);font-size:9px;letter-spacing:.15em;color:var(--tm);text-transform:uppercase;margin-bottom:12px">What You Built &#8212; '+builtCount+'/16 nodes</div>';
    ['infra','mgr','comms','se'].forEach(function(tk){
      var tm2=TRACK_META[tk];var nodes=S.treeStatus()[tk];
      html+='<div style="margin-bottom:10px">';
      html+='<div style="font-size:11px;color:'+tm2.color+';font-weight:600;margin-bottom:5px">'+tm2.icon+' '+tm2.name+'</div>';
      html+='<div style="display:flex;gap:4px">';
      nodes.forEach(function(n){
        var built=n.built;
        html+='<div style="flex:1;background:'+(built?tm2.color+'33':'var(--card)')+';border:1px solid '+(built?tm2.color:'var(--border)')+';border-radius:4px;padding:6px 4px;text-align:center" title="'+n.name+'">';
        html+='<div style="font-size:13px">'+n.icon+'</div>';
        html+='<div style="font-size:8px;color:'+(built?tm2.color:'var(--tm)')+';margin-top:2px;font-family:var(--mono)">'+(built?'&#10003;':'&#8212;')+'</div>';
        html+='</div>';
      });
      html+='</div></div>';
    });
    html+='</div>';

    // Retrospective narrative - what moved the needle
    var apGain=S.ap-(DIFF[S.diff].ap);
    var partGain=S.part-(DIFF[S.diff].part);
    var mgrBuilt=builtIds.filter(function(id){return id.indexOf('mgr')===0;}).length;
    var commsBuilt=builtIds.filter(function(id){return id.indexOf('comms')===0;}).length;
    var infraBuilt=builtIds.filter(function(id){return id.indexOf('infra')===0;}).length;
    var seBuilt=builtIds.filter(function(id){return id.indexOf('se')===0;}).length;
    var retro=[];
    if(apGain>10)retro.push('Reliability grew by '+apGain+' points over five years'+(mgrBuilt>=3?' &#8212; your Follow-Through investments were the primary driver.':'.'));
    else if(apGain>0)retro.push('Reliability moved +'+apGain+' points'+(mgrBuilt<2?' &#8212; deeper Follow-Through investment would likely have accelerated this.':'.'));
    else retro.push('Reliability did not meaningfully improve. People still do not fully count on you to follow through.');
    if(partGain>5)retro.push('Turnout grew by '+partGain+'% &#8212;'+(commsBuilt>=2?' your Staying in Touch investments made people feel like showing up was worth it.':' stronger Staying in Touch investment would have compounded this further.'));
    else if(partGain<0)retro.push('Turnout declined. People lost confidence that showing up was worth it.');
    if(z.id==='champion')retro.push('You became Group Leader. People look to you, by the end, as the reason this all still happens.');
    else if(z.id==='engaged')retro.push('You became a real Confidant &#8212; people lean on you, even if Group Leader was still a reach with a few stronger decisions.');
    else if(z.id==='building')retro.push('You became a Close Friend to the group. Real footing, even if it never fully became reciprocal.');
    else if(z.id==='cautious')retro.push('You stayed a Friend, not much more. The connection survived but never deepened.');
    else retro.push('You stayed an Acquaintance to your own friend group. Always one quiet season away from drifting out of it entirely.');
    if(mgrBuilt>=3&&apGain>8)retro.push('The Follow-Through and Reliability combination proved to be your strongest compounding investment.');
    if(commsBuilt>=3&&partGain>5)retro.push('Staying in Touch investment translated directly into turnout gains &#8212; people felt looped in even when they missed a stretch.');
    html+='<div style="background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:16px">';
    html+='<div style="font-family:var(--mono);font-size:9px;letter-spacing:.15em;color:var(--amber);text-transform:uppercase;margin-bottom:10px">What Moved the Needle</div>';
    retro.forEach(function(r){html+='<p style="font-size:12px;color:var(--t2);line-height:1.65;margin-bottom:8px">'+r+'</p>';});
    html+='</div>';


    // Per-leader movement: stage 0 (where everyone starts) vs where they ended.
    if(hist.length>1){
      html+='<div style="background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:16px">';
      html+='<div style="font-family:var(--mono);font-size:9px;letter-spacing:.15em;color:var(--tm);text-transform:uppercase;margin-bottom:12px">Where People Ended Up</div>';
      [['core','Core Crew'],['wide','Wider Circle']].forEach(function(grp,gi){
        var tier=grp[0],glabel=grp[1];
        html+='<div style="font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px'+(gi>0?';margin-top:14px':'')+'">'+glabel+'</div>';
        html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">';
        tierIds(tier).forEach(function(charId){
          var arc=CHAR_ARCS[charId];
          var ch=CHARS[charId];
          var finalStage=S.charArcs[charId]||0;
          var startInfo=arc.stages[0];
          var endInfo=arc.stages[finalStage];
          html+='<div style="background:var(--card);border-radius:var(--rs);padding:10px;display:flex;gap:8px;align-items:flex-start">';
          html+='<span style="font-size:20px;flex-shrink:0">'+ch.av+'</span>';
          html+='<div><div style="font-size:12px;font-weight:600;color:var(--t2)">'+ch.name+'</div>';
          html+='<div style="font-size:11px;margin-top:2px"><span style="color:var(--tm)">'+startInfo.label+'</span> <span style="color:var(--tm)">&#8594;</span> <span style="color:'+(finalStage>0?'var(--green)':'var(--tm)')+';font-weight:600">'+endInfo.label+'</span></div>';
          html+='</div></div>';
        });
        html+='</div>';
      });
      html+='</div>';
    }

    html+='<button class="btn-p" onclick="C.restart()">Play Again</button>';
    html+='</div>';
    this.app().innerHTML=html;
  },

        html+='</div>';
